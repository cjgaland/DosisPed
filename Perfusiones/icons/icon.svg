<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <!-- Fondo: degradado sutil de esquina -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1c2230"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <!-- Brillo del borde -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0087ff" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Mitad izquierda de la cápsula -->
    <clipPath id="capLeft">
      <rect x="-66" y="-30" width="66" height="60"/>
    </clipPath>
    <!-- Mitad derecha de la cápsula -->
    <clipPath id="capRight">
      <rect x="0" y="-30" width="66" height="60"/>
    </clipPath>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="192" height="192" rx="42" fill="url(#bgGrad)"/>
  <!-- Borde con brillo -->
  <rect width="192" height="192" rx="42"
        fill="none" stroke="url(#borderGrad)" stroke-width="3"/>

  <!-- Cápsula, centrada en (96,96) y rotada 45° -->
  <g transform="translate(96,96) rotate(-45)">
    <!-- Mitad derecha: cyan -->
    <rect x="-66" y="-30" width="132" height="60" rx="30"
          fill="#00d4ff" clip-path="url(#capRight)"/>
    <!-- Mitad izquierda: blanco suave -->
    <rect x="-66" y="-30" width="132" height="60" rx="30"
          fill="#dde8f4" clip-path="url(#capLeft)"/>
    <!-- Costura central -->
    <rect x="-2" y="-30" width="4" height="60" fill="#0d1117" opacity="0.9"/>
    <!-- Brillo interno izquierdo -->
    <ellipse cx="-33" cy="-10" rx="14" ry="7"
             fill="white" opacity="0.25" transform="rotate(0)"/>
  </g>
</svg>
