<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <clipPath id="capLeftA">
      <rect x="-62" y="-28" width="62" height="56"/>
    </clipPath>
    <clipPath id="capRightA">
      <rect x="0" y="-28" width="62" height="56"/>
    </clipPath>
  </defs>

  <!-- Fondo sólido (iOS ignora transparencias en touch icons) -->
  <rect width="180" height="180" fill="#161b22"/>

  <!-- Cápsula -->
  <g transform="translate(90,90) rotate(-45)">
    <rect x="-62" y="-28" width="124" height="56" rx="28"
          fill="#00d4ff" clip-path="url(#capRightA)"/>
    <rect x="-62" y="-28" width="124" height="56" rx="28"
          fill="#dde8f4" clip-path="url(#capLeftA)"/>
    <rect x="-2" y="-28" width="4" height="56" fill="#161b22" opacity="0.9"/>
    <ellipse cx="-31" cy="-9" rx="13" ry="6" fill="white" opacity="0.25"/>
  </g>
</svg>
